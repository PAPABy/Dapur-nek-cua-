<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dapur Nek Cua | Kue Lebaran Bersama</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #f8f5f0;
  color: #3e2f23;
}

header {
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 40px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}
.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  object-position: center;
  border-radius: 12px;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

.btn {
  display: inline-block;
  background-color: #c6a75e;
  color: white;
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 25px;
  margin-top: 10px;
}

  /* LOADER */
#loader {
  position: fixed;
  inset: 0;
  background: #f8f5f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease;
}

.spinner {
  width: 45px;
  height: 45px;
  border: 4px solid #e5dccf;
  border-top: 4px solid #c6a75e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loader p {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: #3e2f23;
}

.image-wrapper {
  position: relative;
}

.watermark {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  background: rgba(62,47,35,0.7);
  color: white;
  padding: 4px 8px;
  border-radius: 20px;
  opacity: 0.8;
}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Dapur Nek Cua</p>
</div>
  
<header>
  <h1>Dapur Nek Cua</h1>
  <p>Kue Lebaran Bersama Buatan Rumah di Dapur Ibu</p>
</header>

<section class="products" id="productContainer"></section>

<footer style="text-align:center; padding:30px;">
  © 2026 Dapur Nek Cua - Kasih Sayang Ibu
</footer>

<script>
const phoneNumber = "62895602016464";

fetch("products.json")
  .then(response => response.json())
  .then(products => {
    const container = document.getElementById("productContainer");

    products.forEach(product => {
      const card = document.createElement("div");
      card.className = "card";

      const message = `Halo Dapur Nek Cua, saya ingin memesan ${product.name}`;
      const waLink = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

      card.innerHTML = `
  <div class="image-wrapper">
    <img src="${product.image}" alt="${product.name}">
    <span class="watermark">Dapur Nek Cua</span>
  </div>
        <h3>${product.name}</h3>
        <p>Rp${product.price.toLocaleString()} / toples</p>
        <a class="btn" href="${waLink}" target="_blank">Pesan Untuk Keluarga</a>
      `;

      container.appendChild(card);
    });
  });
</script>

<script>
window.addEventListener("load", function() {
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.style.display = "none", 500);
});
</script>
  
</body>
</html>
